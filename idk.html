<!-- =========================================
MEDISYNC AI ADVANCED LOGIN SCREEN
- Smaller login card
- Left aligned login panel
- Interactive JS animations
- Patient / Doctor login toggle
- Video background support
========================================= -->

<div class="login-screen">

    <!-- VIDEO BACKGROUND -->
    <!-- PUT YOUR VIDEO PATH BELOW -->
    <video autoplay muted loop playsinline class="bg-video">
      <source src="YOUR_VIDEO.mp4" type="video/mp4">
    </video>
  
    <!-- DARK OVERLAY -->
    <div class="video-overlay"></div>
  
    <!-- FLOATING GLOW -->
    <div class="glow glow1"></div>
    <div class="glow glow2"></div>
  
    <!-- MAIN CONTENT -->
    <div class="login-wrapper">
  
      <!-- LEFT LOGIN CARD -->
      <div class="login-panel" id="loginCard">
  
        <!-- LOGO -->
        <div class="logo-section">
  
          <div class="logo-box">
            <svg viewBox="0 0 24 24" fill="none">
              <path
                d="M3 12h4l2-7 4 14 2-7h6"
                stroke="white"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </div>
  
          <div>
            <h1>MediSync AI</h1>
            <p>Healthcare Intelligence Platform</p>
          </div>
  
        </div>
  
        <!-- ACTIVE STATUS -->
        <div class="status-badge">
          <span class="status-dot"></span>
          AI SYSTEM ACTIVE
        </div>
  
        <!-- HEADING -->
        <div class="hero-text">
  
          <h2>
            Synapse : A secure AI Healthcare Access
          </h2>
  
          <p>
            Access intelligent patient monitoring,
            diagnostics and AI-powered healthcare systems.
          </p>
  
        </div>
  
        <!-- LOGIN TYPE -->
        <div class="login-switch">
  
          <button class="switch-btn active" id="doctorBtn">
            Doctor Login
          </button>
  
          <button class="switch-btn" id="patientBtn">
            Patient Login
          </button>
  
        </div>
  
        <!-- FORM -->
        <form id="loginForm">
  
          <div class="input-group">
  
            <label>Email Address</label>
  
            <input
              type="email"
              placeholder="doctor@medisync.ai"
              required
            />
  
          </div>
  
          <div class="input-group">
  
            <label>Password</label>
  
            <input
              type="password"
              placeholder="••••••••••"
              required
            />
  
          </div>
  
          <div class="options-row">
  
            <label class="remember">
              <input type="checkbox">
              Remember me
            </label>
  
            <a href="#">Forgot Password?</a>
  
          </div>
  
          <!-- LOGIN BUTTON -->
          <button class="login-btn" type="submit">
  
            <span class="btn-text">
              Access Dashboard
            </span>
  
            <div class="btn-shine"></div>
  
          </button>
  
        </form>
  
      </div>
  
    </div>
  
  </div>
  
  <style>
  
  /* =========================
  GLOBAL
  ========================= */
  
  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
  }
  
  body{
    overflow:hidden;
    font-family:
      "Inter",
      sans-serif;
  }
  
  /* =========================
  MAIN SCREEN
  ========================= */
  
  .login-screen{
    position:fixed;
    inset:0;
    overflow:hidden;
    background:#04010d;
  }
  
  /* =========================
  VIDEO
  ========================= */
  
  .bg-video{
    position:absolute;
    inset:0;
  
    width:100%;
    height:100%;
  
    object-fit:cover;
  
    opacity:.35;
  }
  
  .video-overlay{
    position:absolute;
    inset:0;
  
    background:
      linear-gradient(
        90deg,
        rgba(3,3,15,.92) 0%,
        rgba(3,3,15,.82) 35%,
        rgba(3,3,15,.58) 100%
      );
  }
  
  /* =========================
  GLOW EFFECTS
  ========================= */
  
  .glow{
    position:absolute;
    border-radius:50%;
    filter:blur(120px);
  }
  
  .glow1{
    width:420px;
    height:420px;
  
    background:#9333ea;
  
    top:-120px;
    left:-120px;
  
    animation:float1 8s infinite alternate;
  }
  
  .glow2{
    width:380px;
    height:380px;
  
    background:#06b6d4;
  
    right:-100px;
    bottom:-120px;
  
    animation:float2 10s infinite alternate;
  }
  
  @keyframes float1{
    from{
      transform:translateY(0px);
    }
    to{
      transform:translateY(60px);
    }
  }
  
  @keyframes float2{
    from{
      transform:translateY(0px);
    }
    to{
      transform:translateY(-60px);
    }
  }
  
  /* =========================
  WRAPPER
  ========================= */
  
  .login-wrapper{
    position:relative;
    z-index:5;
  
    width:100%;
    height:100vh;
  
    display:flex;
    align-items:center;
  
    padding-left:90px;
  }
  
  /* =========================
  LOGIN CARD
  ========================= */
  
  .login-panel{
  
    width:480px;
  
    padding:42px;
  
    border-radius:34px;
  
    background:
      linear-gradient(
        180deg,
        rgba(15,15,35,.72),
        rgba(8,8,24,.88)
      );
  
    border:
      1px solid rgba(255,255,255,.08);
  
    backdrop-filter:blur(24px);
  
    box-shadow:
      0 30px 60px rgba(0,0,0,.6),
      inset 0 0 0 1px rgba(255,255,255,.03);
  
    animation:cardEnter 1s cubic-bezier(.2,.8,.2,1);
  
    transition:
      transform .2s ease;
  }
  
  @keyframes cardEnter{
    from{
      opacity:0;
      transform:
        translateX(-40px)
        scale(.92);
    }
  
    to{
      opacity:1;
      transform:
        translateX(0px)
        scale(1);
    }
  }
  
  /* =========================
  LOGO
  ========================= */
  
  .logo-section{
    display:flex;
    align-items:center;
    gap:18px;
  
    margin-bottom:26px;
  }
  
  .logo-box{
    width:72px;
    height:72px;
  
    border-radius:22px;
  
    background:
      linear-gradient(
        135deg,
        #9333ea,
        #06b6d4
      );
  
    display:grid;
    place-items:center;
  
    box-shadow:
      0 0 30px rgba(147,51,234,.4);
  }
  
  .logo-box svg{
    width:34px;
    height:34px;
  }
  
  .logo-section h1{
    color:white;
    font-size:38px;
    font-weight:800;
  }
  
  .logo-section p{
    margin-top:5px;
    color:#b0b0ca;
  }
  
  /* =========================
  STATUS
  ========================= */
  
  .status-badge{
  
    width:max-content;
  
    padding:12px 20px;
  
    border-radius:999px;
  
    background:
      rgba(57,183,255,.08);
  
    border:
      1px solid rgba(57,183,255,.22);
  
    color:#5fd6ff;
  
    font-size:14px;
    font-weight:600;
  
    display:flex;
    align-items:center;
    gap:10px;
  
    margin-bottom:30px;
  }
  
  .status-dot{
    width:10px;
    height:10px;
  
    border-radius:50%;
  
    background:#00ff99;
  
    animation:pulseDot 1s infinite;
  }
  
  @keyframes pulseDot{
    0%{
      transform:scale(1);
    }
  
    50%{
      transform:scale(1.5);
    }
  
    100%{
      transform:scale(1);
    }
  }
  
  /* =========================
  TEXT
  ========================= */
  
  .hero-text h2{
    font-size:54px;
    line-height:1.1;
  
    color:white;
  
    margin-bottom:18px;
  }
  
  .hero-text p{
    color:#a7a7c7;
  
    line-height:1.7;
  
    margin-bottom:36px;
  }
  
  /* =========================
  LOGIN SWITCH
  ========================= */
  
  .login-switch{
  
    display:flex;
    gap:12px;
  
    margin-bottom:30px;
  }
  
  .switch-btn{
  
    flex:1;
  
    height:54px;
  
    border:none;
    cursor:pointer;
  
    border-radius:16px;
  
    background:
      rgba(255,255,255,.04);
  
    border:
      1px solid rgba(255,255,255,.06);
  
    color:#b6b6d0;
  
    font-weight:600;
  
    transition:.3s;
  }
  
  .switch-btn.active{
  
    background:
      linear-gradient(
        90deg,
        #9333ea,
        #06b6d4
      );
  
    color:white;
  
    box-shadow:
      0 0 25px rgba(147,51,234,.35);
  }
  
  .switch-btn:hover{
    transform:translateY(-2px);
  }
  
  /* =========================
  FORM
  ========================= */
  
  .input-group{
    margin-bottom:24px;
  }
  
  .input-group label{
    display:block;
  
    margin-bottom:12px;
  
    color:#d5d5ec;
  
    font-size:14px;
  }
  
  .input-group input{
  
    width:100%;
    height:66px;
  
    border:none;
    outline:none;
  
    border-radius:18px;
  
    padding:0 22px;
  
    background:
      rgba(255,255,255,.04);
  
    border:
      1px solid rgba(255,255,255,.06);
  
    color:white;
  
    font-size:17px;
  
    transition:.3s;
  }
  
  .input-group input:focus{
  
    border-color:
      rgba(57,183,255,.4);
  
    box-shadow:
      0 0 25px rgba(57,183,255,.14);
  
    transform:translateY(-2px);
  }
  
  /* =========================
  OPTIONS
  ========================= */
  
  .options-row{
  
    display:flex;
    justify-content:space-between;
    align-items:center;
  
    margin-bottom:30px;
  }
  
  .remember{
    color:#b5b5cf;
  
    display:flex;
    align-items:center;
    gap:10px;
  
    font-size:14px;
  }
  
  .options-row a{
    color:#67d4ff;
    text-decoration:none;
  }
  
  /* =========================
  BUTTON
  ========================= */
  
  .login-btn{
  
    width:100%;
    height:68px;
  
    border:none;
    cursor:pointer;
  
    border-radius:20px;
  
    position:relative;
    overflow:hidden;
  
    background:
      linear-gradient(
        90deg,
        #9333ea,
        #d946ef,
        #06b6d4
      );
  
    color:white;
  
    font-size:18px;
    font-weight:700;
  
    transition:.35s;
  }
  
  .login-btn:hover{
  
    transform:
      translateY(-4px)
      scale(1.02);
  
    box-shadow:
      0 20px 40px rgba(217,70,239,.35);
  }
  
  .btn-shine{
  
    position:absolute;
    inset:0;
  
    background:
      linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.25),
        transparent
      );
  
    transform:translateX(-100%);
  
    animation:shine 3s infinite;
  }
  
  @keyframes shine{
    100%{
      transform:translateX(100%);
    }
  }
  
  /* =========================
  RESPONSIVE
  ========================= */
  
  @media(max-width:768px){
  
    .login-wrapper{
      justify-content:center;
      padding:20px;
    }
  
    .login-panel{
      width:100%;
    }
  
    .hero-text h2{
      font-size:42px;
    }
  
  }
  
  </style>
  
  <script>
  
  /* =========================
  LOGIN TOGGLE
  ========================= */
  
  const doctorBtn =
  document.getElementById("doctorBtn");
  
  const patientBtn =
  document.getElementById("patientBtn");
  
  doctorBtn.onclick = ()=>{
  
    doctorBtn.classList.add("active");
    patientBtn.classList.remove("active");
  
  };
  
  patientBtn.onclick = ()=>{
  
    patientBtn.classList.add("active");
    doctorBtn.classList.remove("active");
  
  };
  
  /* =========================
  LOGIN BUTTON INTERACTION
  ========================= */
  
  const form =
  document.getElementById("loginForm");
  
  form.addEventListener("submit",(e)=>{
  
    e.preventDefault();
  
    const btn =
    document.querySelector(".login-btn");
  
    const text =
    document.querySelector(".btn-text");
  
    text.innerHTML = "Connecting...";
  
    btn.style.opacity = ".85";
  
    setTimeout(()=>{
  
      text.innerHTML =
      "Access Granted ✓";
  
      btn.style.background =
      "linear-gradient(90deg,#00ff99,#06b6d4)";
  
    },1600);
  
  });
  
  /* =========================
  3D MOUSE PARALLAX
  ========================= */
  
  const card =
  document.getElementById("loginCard");
  
  document.addEventListener("mousemove",(e)=>{
  
    const x =
    (window.innerWidth / 2 - e.pageX) / 28;
  
    const y =
    (window.innerHeight / 2 - e.pageY) / 28;
  
    card.style.transform =
    `rotateY(${-x}deg)
     rotateX(${y}deg)`;
  
  });
  
  </script>
